<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Backbone</title>
<style>
:root{--bg:#0e1116;--card:#171c24;--line:#262d39;--txt:#e6e9ef;--dim:#8b94a7;
--green:#3fb96a;--amber:#e0a93e;--red:#e0563e;--blue:#4f8ef7;}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--txt);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding-bottom:40px}
header{position:sticky;top:0;background:rgba(14,17,22,.95);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;gap:8px;align-items:center;z-index:5}
header h1{font-size:16px;font-weight:700;margin-right:6px}
nav a{color:var(--dim);text-decoration:none;padding:5px 10px;border-radius:7px;font-size:14px}
nav a.on{color:var(--txt);background:var(--card)}
#who{margin-left:auto;color:var(--dim);font-size:12px}
main{max-width:780px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:10px}
.card h3{font-size:14px;margin-bottom:4px}
.meta{color:var(--dim);font-size:12px;display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.sec{margin:18px 0 8px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
.dot{display:inline-block;width:8px;height:8px;border-radius:4px;margin-right:7px}
.p-urgent{background:var(--red)}.p-high{background:var(--amber)}.p-medium{background:var(--blue)}.p-low{background:var(--dim)}
.chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11.5px;border:1px solid var(--line);margin:2px 4px 2px 0;color:var(--dim)}
.chip.ok{color:var(--green);border-color:rgba(63,185,106,.4)}
.chip.bad{color:var(--red);border-color:rgba(224,86,62,.45)}
.chip.warn{color:var(--amber);border-color:rgba(224,169,62,.45)}
button{background:var(--blue);border:0;color:#fff;border-radius:8px;padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer}
button.opt{background:var(--card);border:1px solid var(--blue);color:var(--blue);margin:4px 6px 0 0}
button:active{opacity:.7}
input[type=text]{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:9px 11px;font-size:14px;margin-top:8px}
.row{display:flex;gap:8px;align-items:center;margin-top:8px}
.sla{font-weight:700}.sla.late{color:var(--red)}.sla.soon{color:var(--amber)}.sla.fine{color:var(--green)}
a{color:var(--blue)}
.task{cursor:pointer}
.tl{border-left:2px solid var(--line);margin-left:6px;padding-left:14px}
.tl div{margin-bottom:9px;font-size:13.5px}
.tl time{color:var(--dim);font-size:11.5px;display:block}
.empty{color:var(--dim);padding:24px;text-align:center}
#login{max-width:340px;margin:18vh auto;text-align:center}
pre{white-space:pre-wrap;font-size:13px;color:var(--dim)}
.kv{font-size:13.5px;margin:3px 0}.kv b{color:var(--dim);font-weight:600;margin-right:6px}
</style></head><body>
<header><h1>Backbone</h1>
<nav><a href="#decisions" id="n-decisions">Decisions</a><a href="#board" id="n-board">Board</a><a href="#pulse" id="n-pulse">Pulse</a></nav>
<span id="who"></span></header>
<main id="app"></main>
<script>
var BASE='https://nkpmzpttlajqjykzhmoc.supabase.co/functions/v1/board';
var qs=new URLSearchParams(location.search);
if(qs.get('token')){localStorage.setItem('bb_token',qs.get('token'));history.replaceState(null,'',location.pathname+location.hash);}
var TOKEN=localStorage.getItem('bb_token')||'';
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function api(action,params){
  return fetch(BASE,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({token:TOKEN,action:action},params||{}))})
  .then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j.error||r.status);return j;});});
}
function ago(h){if(h==null)return'';if(h<1)return Math.round(h*60)+'m';if(h<48)return Math.round(h)+'h';return Math.round(h/24)+'d';}
function fmtTs(t){if(!t)return'';var d=new Date(t);return d.toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
function setNav(v){['decisions','board','pulse'].forEach(function(n){var el=document.getElementById('n-'+n);if(el)el.className=(v===n)?'on':'';});}
function show(html){document.getElementById('app').innerHTML=html;}
function loginView(){
  show('<div id="login" class="card"><h3>Backbone board</h3><p class="meta">Paste your access token</p>'+
  '<input type="text" id="tok" placeholder="access token"><div class="row"><button onclick="saveTok()">Enter</button></div></div>');
}
function saveTok(){TOKEN=document.getElementById('tok').value.trim();localStorage.setItem('bb_token',TOKEN);render();}
function taskRow(t){
  return '<div class="card task" onclick="location.hash=\'task/'+t.id+'\'">'+
  '<h3><span class="dot p-'+esc(t.priority)+'"></span>'+esc(t.deliverable_spec)+'</h3>'+
  '<div class="meta"><span>'+esc(t.type)+'</span><span>'+esc(t.state)+'</span>'+
  (t.claimed_by?'<span>claimed: '+esc(t.claimed_by)+'</span>':'<span>unclaimed</span>')+
  (t.deadline?'<span>due '+fmtTs(t.deadline)+'</span>':'')+
  (t.external_id?'<span>'+esc(t.external_id)+'</span>':'')+'</div></div>';
}
function decisionCard(d,approver,viewer){
  var sla=d.sla_remaining_hours,cls=d.escalated||sla<0?'late':(sla<6?'soon':'fine');
  var h='<div class="card"><h3>'+esc(d.question)+'</h3>'+
  '<div class="meta"><span>for <b>'+esc(approver)+'</b></span><span>from '+esc(d.opened_by)+'</span>'+
  '<span>open '+ago(d.age_hours)+'</span><span class="sla '+cls+'">'+
  (d.escalated?'ESCALATED':(sla<0?Math.abs(Math.round(sla))+'h over SLA':Math.round(sla)+'h left'))+'</span></div>';
  if(d.artifact_url)h+='<div class="kv"><a href="'+esc(d.artifact_url)+'" target="_blank">Review artifact ↗</a></div>';
  if(d.default_action)h+='<div class="kv"><b>default</b>'+esc(d.default_action)+'</div>';
  if(d.blocking_task_id)h+='<div class="kv"><b>blocks</b><a href="#task/'+d.blocking_task_id+'">task '+d.blocking_task_id.slice(0,8)+'</a></div>';
  if(approver===viewer){
    if(d.options&&d.options.length)d.options.forEach(function(o){
      h+='<button class="opt" onclick="resolveD(\''+d.id+'\',this.textContent)">'+esc(o.label||o)+'</button>';});
    h+='<input type="text" id="r-'+d.id+'" placeholder="or type a resolution">'+
    '<div class="row"><button onclick="resolveD(\''+d.id+'\',document.getElementById(\'r-'+d.id+'\').value)">Resolve</button></div>';
  }
  return h+'</div>';
}
function resolveD(id,resolution){
  resolution=(resolution||'').trim();if(!resolution){alert('Type or pick a resolution first.');return;}
  api('resolve',{decision_id:id,resolution:resolution}).then(function(r){
    if(r.result&&r.result.notice)alert(r.result.notice);render();
  }).catch(function(e){alert(e.message);});
}
function decisionsView(){
  api('board').then(function(r){
    document.getElementById('who').textContent=r.viewer;
    var d=r.board.decisions_by_approver||{},me=d[r.viewer]||[],h='';
    h+='<div class="sec">Your queue ('+me.length+')</div>';
    h+=me.length?me.map(function(x){return decisionCard(x,r.viewer,r.viewer);}).join(''):'<div class="empty">Nothing waiting on you. ✓</div>';
    var others=Object.keys(d).filter(function(k){return k!==r.viewer;});
    others.forEach(function(k){h+='<div class="sec">Waiting on '+esc(k)+' ('+d[k].length+')</div>'+d[k].map(function(x){return decisionCard(x,k,r.viewer);}).join('');});
    show(h);
  }).catch(errView);
}
function boardView(){
  api('board').then(function(r){
    document.getElementById('who').textContent=r.viewer;
    var b=r.board,h='';
    h+='<div class="sec">Cron health</div><div>'+(b.cron_health||[]).map(function(c){
      var cls=c.health==='ok'?'ok':(c.health==='late'||c.health==='failed'?'bad':'warn');
      return '<span class="chip '+cls+'">'+esc(c.id)+' · '+esc(c.health)+'</span>';}).join('')+'</div>';
    if((b.programs||[]).length)h+='<div class="sec">Programs</div>'+(b.programs).map(function(p){
      return '<div class="card"><h3>'+esc(p.name)+'</h3><div class="meta"><span>'+esc(p.type)+'</span><span>'+p.open_tasks+' open tasks</span></div></div>';}).join('');
    var states=Object.keys(b.tasks_by_state||{});
    var order=['blocked','ready','in_production'];
    states.sort(function(a,bb){var ia=order.indexOf(a),ib=order.indexOf(bb);return(ia<0?9:ia)-(ib<0?9:ib);});
    if(!states.length)h+='<div class="empty">No tasks on the board.</div>';
    states.forEach(function(s){var ts=b.tasks_by_state[s];
      h+='<div class="sec">'+esc(s)+' ('+ts.length+')</div>'+ts.map(taskRow).join('');});
    var reqs=b.open_requests||[];
    if(reqs.length)h+='<div class="sec">Open data requests ('+reqs.length+')</div>'+reqs.map(function(q){
      return '<div class="card"><h3>'+esc(q.request)+'</h3><div class="meta"><span>'+esc(q.type)+'</span><span>'+esc(q.requester)+' → '+esc(q.fulfiller||'anyone')+'</span><span>open '+ago(q.age_hours)+'</span></div></div>';}).join('');
    show(h);
  }).catch(errView);
}
function taskView(id){
  api('task',{task_id:id}).then(function(r){
    document.getElementById('who').textContent=r.viewer;
    var t=r.task,h='<div class="card"><h3><span class="dot p-'+esc(t.priority)+'"></span>'+esc(t.deliverable_spec)+'</h3>';
    [['state',t.state],['type',t.type],['workflow',t.workflow],['claimed by',t.claimed_by],
     ['lease',t.lease_expires_at?fmtTs(t.lease_expires_at):null],['deadline',t.deadline?fmtTs(t.deadline):null],
     ['output',t.output_location],['created by',t.created_by],['external id',t.external_id],
     ['wiki',t.wiki_page],['skill route',t.skill_route]].forEach(function(kv){
      if(kv[1])h+='<div class="kv"><b>'+kv[0]+'</b>'+esc(kv[1])+'</div>';});
    if(t.context)h+='<div class="kv"><b>context</b>'+esc(t.context)+'</div>';
    if(t.supersedes_id)h+='<div class="kv"><b>supersedes</b><a href="#task/'+t.supersedes_id+'">'+t.supersedes_id.slice(0,8)+'</a></div>';
    if(t.superseded_by)h+='<div class="kv"><b>superseded by</b><a href="#task/'+t.superseded_by+'">'+t.superseded_by.slice(0,8)+'</a></div>';
    h+='</div>';
    if((r.deliverables||[]).length)h+='<div class="sec">Deliverables</div>'+r.deliverables.map(function(d){
      return '<div class="card"><h3>v'+d.version+' by '+esc(d.produced_by)+'</h3><div class="meta"><span>'+fmtTs(d.completed_at)+'</span></div>'+
      (d.drive_url?'<div class="kv"><a href="'+esc(d.drive_url)+'" target="_blank">Open deliverable ↗</a></div>':'')+
      (d.inline_content?'<pre>'+esc(d.inline_content)+'</pre>':'')+'</div>';}).join('');
    if((r.decisions||[]).length)h+='<div class="sec">Decisions</div>'+r.decisions.map(function(d){
      return '<div class="card"><h3>'+esc(d.question)+'</h3><div class="meta"><span>'+esc(d.approver)+'</span><span>'+
      (d.resolved_at?'resolved: '+esc(d.resolution):'open')+'</span></div></div>';}).join('');
    h+='<div class="sec">Timeline</div><div class="card"><div class="tl">'+(r.timeline||[]).map(function(e){
      return '<div><time>'+fmtTs(e.ts)+' · '+esc(e.actor)+'</time>'+esc(e.verb)+
      (e.payload&&e.payload.note?' — '+esc(e.payload.note):'')+'</div>';}).join('')+'</div></div>';
    show(h);
  }).catch(errView);
}
function pulseView(){
  api('pulse').then(function(r){
    document.getElementById('who').textContent=r.viewer;
    var p=r.pulse,h='';
    var dv=p.completed_deliverables||[];
    h+='<div class="sec">Shipped today ('+dv.length+')</div>';
    h+=dv.length?dv.map(function(d){return '<div class="card"><h3>'+esc(d.spec)+'</h3><div class="meta"><span>'+esc(d.produced_by)+'</span><span>'+fmtTs(d.completed_at)+'</span>'+(d.drive_url?'<span><a target="_blank" href="'+esc(d.drive_url)+'">open ↗</a></span>':'')+'</div></div>';}).join(''):'<div class="empty">Nothing shipped yet today.</div>';
    var bn=p.blocked_now||{};
    if((bn.decisions||[]).length)h+='<div class="sec">Blocked on humans</div>'+bn.decisions.map(function(d){
      return '<div class="card"><h3>'+esc(d.question)+'</h3><div class="meta"><span>'+esc(d.approver)+'</span><span>open '+ago(d.age_hours)+'</span>'+(d.escalated?'<span class="sla late">ESCALATED</span>':'')+'</div></div>';}).join('');
    ['major','standard','routine'].forEach(function(sig){
      var ev=(p.events||{})[sig]||[];if(!ev.length)return;
      h+='<div class="sec">'+sig+' events ('+ev.length+')</div><div class="card"><div class="tl">'+
      ev.slice(-40).map(function(e){return '<div><time>'+fmtTs(e.ts)+' · '+esc(e.actor)+'</time>'+esc(e.verb)+' · '+esc(e.object_type)+' '+esc(String(e.object_id).slice(0,8))+'</div>';}).join('')+'</div></div>';});
    show(h);
  }).catch(errView);
}
function errView(e){
  if(String(e.message).indexOf('invalid token')>=0){localStorage.removeItem('bb_token');TOKEN='';loginView();}
  else show('<div class="empty">'+esc(e.message)+'</div>');
}
function render(){
  if(!TOKEN){loginView();return;}
  var hsh=location.hash.replace('#','')||'decisions';
  if(hsh.indexOf('task/')===0){setNav('');taskView(hsh.slice(5));return;}
  setNav(hsh);
  if(hsh==='board')boardView();else if(hsh==='pulse')pulseView();else decisionsView();
}
window.addEventListener('hashchange',render);
// Poll only while the tab is actually visible; refresh instantly on return.
setInterval(function(){
  if(TOKEN&&document.visibilityState==='visible'&&location.hash.indexOf('task/')<0)render();
},60000);
document.addEventListener('visibilitychange',function(){
  if(TOKEN&&document.visibilityState==='visible')render();
});
render();
</script></body></html>
